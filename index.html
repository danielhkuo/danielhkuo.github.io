<head>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Lato&display=swap" rel="stylesheet">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<script src="https://cdn.tailwindcss.com"></script>
	<style>
		:root {
			--nord0: #2E3440;
			--nord1: #3B4252;
			--nord2: #434C5E;
			--nord3: #4C566A;
			--nord4: #D8DEE9;
			--nord5: #E5E9F0;
			--nord6: #ECEFF4;
			--nord7: #8FBCBB;
			--nord8: #88C0D0;
			--nord9: #81A1C1;
			--nord10: #5E81AC;
			--nord11: #BF616A;
			--nord12: #D08770;
			--nord13: #EBCB8B;
			--nord14: #A3BE8C;
			--nord15: #B48EAD;
		}

		body {
			margin: 0;
			font-family: "Lato", sans-serif;
			font-weight: 400;
			font-style: normal;
			/* Adding Font Smoothing */
			-webkit-font-smoothing: antialiased;
			-moz-osx-font-smoothing: grayscale;
		}

		button {
			font-family: "Lato", sans-serif;
			font-weight: 700;
			font-style: bold;
		}

		.bg-gray-900 {
			background-color: var(--nord0);
		}

		.bg-brand-teal {
			background-color: var(--nord7);
		}

		.bg-white {
			background-color: var(--nord6);
		}

		.text-brand-teal {
			color: var(--nord7);
		}

		.text-brand-teal-dark {
			color: var(--nord8);
		}

		.text-white {
			color: var(--nord6);
		}

		.justify-between {
			justify-content: space-between;
		}

		.justify-center {
			justify-content: center;
		}

		.justify-end {
			justify-content: end;
		}

		.items-center {
			align-items: center;
		}

		.m-8 {
			margin: 8px;
		}

		.p-8 {
			padding: 8px;
		}

		.no-underline {
			text-decoration: none;
		}

		.border-none {
			border: none;
		}

		.rounded-full {
			border-radius: 9999px;
		}

		.uppercase {
			text-transform: uppercase;
		}

		.text-sm {
			font-size: 14px;
		}

		.relative {
			position: relative;
		}

		.z-10 {
			z-index: 10;
		}

		.tint-50 {
			filter: brightness(50%);
		}

		.tint-30 {
			filter: brightness(30%);
		}

		.object-cover {
			object-fit: cover;
		}

		.absolute {
			position: absolute;
		}

		/* Auto margin width! */
		.mx-auto {
			margin-left: auto;
			margin-right: auto;
		}

		.text-36px {
			font-size: 36px;
		}
		.text-16px {
			font-size: 16px;
		}

		/* sm screen size */
		@media (min-width: 640px) {

		}

		/* md screen size */
		@media (min-width: 768px) {
			.md\:h-550px {
				height: 550px;
			}
		}
	</style>
</head>

<!-- Note: Try to keep using padding shorthand! - 5/23/24 -->
<header class="flex justify-between relative z-10 mx-auto px-6 py-8" style="max-width: 1200px;">
	<div class="flex items-center w-full md:w-auto">
		<img src="./logo.svg" alt="" style="margin-right: 16px;">
		<nav class="hidden md:flex">
			<a href="" class="text-white py-4 px-4 no-underline" style="margin-right: 16px;">Pricing</a>
			<a href="" class="text-white py-4 px-4 no-underline" style="margin-right: 16px;">Courses</a>
			<a href="" class="text-white py-4 px-4 no-underline" style="margin-right: 16px;">Blog</a>
			<a href="" class="text-white py-4 px-4 no-underline" style="margin-right: 16px;">Forum</a>
		</nav>
	</div>
	<div class="flex items-center hidden md:flex">
		<a href="" class="text-white py-4 px-4 no-underline" style="margin-right: 12px;">Login</a>
		<button class="bg-brand-teal text-white border-none rounded-full font-bold py-2 px-4 uppercase text-sm"
			style="margin-right: 16px; overflow:hidden; min-width: 100px;">Sign Up</button>
	</div>
	<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6 text-white md:hidden" style="width: 30px;">
		<path stroke-linecap="round" stroke-linejoin="round" d="M3.75 5.25h16.5m-16.5 4.5h16.5m-16.5 4.5h16.5m-16.5 4.5h16.5" />
	  </svg>	  
</header>

<section class="relative">
	<div class="w-full object-cover absolute md:h-550px">
		<div class="bg-black inset-0 opacity-50 absolute z-10"></div>
		<img src="videos\snow.gif" alt="" class="w-full object-cover tint-50 absolute md:h-550px"
			style="top: -180px; min-height: 400px;">
	</div>
	<div  class="mx-auto" style="max-width: 1200px;">
		<div class="relative z-10 md:pt-32 px-6" style="max-width: 300px;">
			<h1 class="text-white text-36px sm:text-60px font-bold leading-none">
				Hello
				<span class="text-brand-teal-dark">World</span>
			</h1>
			<p class="text-white text-16px sm:text-20px" style="max-width: 300px; margin-top: 30px;">A starter website that I made</p>
			<button class="bg-white text-brand-teal border-none py-2 px-4 w-full md:w-auto"
				style="margin-top: 30px; border-radius: 4px;">Get Started</button>
		</div>
	</div>
</section>
